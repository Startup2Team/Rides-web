name: Deploy (Vultr JNB)

# On every push to main, SSH into the production box and run the deploy script,
# which pulls both repos (Rides-api + Rides-web) and rebuilds the Docker stack —
# so a change to the admin/landing site ships automatically.
#
# Required GitHub Secret:
#   DEPLOY_SSH_KEY — private SSH key trusted by root@139.84.251.242

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vultr (Johannesburg)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 139.84.251.242
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/rides/deploy.sh
