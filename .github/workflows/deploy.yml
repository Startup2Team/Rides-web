name: Deploy (Vultr JNB)

# On push to main, the GitHub runner ships this repo's code to the production
# box over SSH and rebuilds the admin/landing container. No deploy keys needed.
#
# Required GitHub Secret:
#   DEPLOY_SSH_KEY — private SSH key trusted by root@139.84.251.242

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vultr (Johannesburg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -H 139.84.251.242 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship code to the box and rebuild
        run: |
          SSH="ssh -i ~/.ssh/deploy -o BatchMode=yes root@139.84.251.242"
          # Web has no secrets on the box, so a clean replace is safe.
          git archive --format=tar HEAD | $SSH 'rm -rf /opt/rides/Rides-web && mkdir -p /opt/rides/Rides-web && tar -x -C /opt/rides/Rides-web'
          $SSH 'cd /opt/rides/Rides-api/api-server && docker compose -f docker-compose.prod.yml up -d --build admin'
          # Staging admin — same source, built with the staging API URL baked in.
          $SSH 'cd /opt/rides/Rides-api/api-server && docker compose --env-file .env.staging -p rides-staging -f docker-compose.staging.yml up -d --build admin && docker image prune -f'
